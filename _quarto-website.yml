project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!README.md"

website:
  title: "div-anchors"
  site-url: https://d-morrison.github.io/div-anchors/
  description: "A Quarto extension that adds anchor links to theorem divs"
  page-footer:
    center: "Built with [Quarto](https://quarto.org/)"
  back-to-top-navigation: true
  page-navigation: true
  reader-mode: true
  repo-url: https://github.com/d-morrison/div-anchors
  repo-actions: [edit, issue, source]
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Articles"
        menu:
          - text: "Div Anchors Extension Demo"
            href: example.qmd
    right:
      - icon: github
        href: https://github.com/d-morrison/div-anchors
        aria-label: GitHub

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-location: right
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-link: true
    highlight-style: pygments
    lightbox: true
    link-external-icon: true
    embed-resources: false
    fig-cap-location: top
    html-math-method: mathjax
    number-sections: true
    number-depth: 3
    df-print: paged
  docx:
    number-sections: true
    number-depth: 3
    df-print: tibble
    prefer-html: true
  revealjs:
    output-file: "{stem}-slides.html"
    theme: simple
    slide-number: true
    chalkboard: false
    preview-links: auto
    controls: true
    transition: slide
    background-transition: fade
    lightbox: true
    fig-cap-location: top
    html-math-method: mathjax
    smaller: true
    number-sections: true
    progress: true
    incremental: false
    df-print: paged
    number-depth: 2
    shift-heading-level-by: -1
    slide-level: 2
    scrollable: true
    echo: true
    margin: 0.0
    code-fold: true
    code-link: true
    code-summary: "[R code]"
    auto-stretch: true
    fig-height: 5
    fig-width: 7

execute:
  warning: false
  message: false
  cache: false
  freeze: auto

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"
